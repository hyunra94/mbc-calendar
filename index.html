<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-하이테크 플랫폼 교육 일정</title>
<link rel="icon" href="https://hyunra94.github.io/assets/favicon.png">
<meta property="og:title" content="K-하이테크 플랫폼 교육 일정">
<meta property="og:image" content="https://hyunra94.github.io/assets/og-default.png">
<meta property="og:url" content="https://hyunra94.github.io/mbc-calendar">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#fafafa;color:#1a1a1a}
.page{max-width:700px;margin:0 auto;padding:24px 20px 40px}
.err{display:none;background:#fff3cd;color:#856404;font-size:11px;padding:8px 12px;border-radius:8px;margin-bottom:12px;border:1px solid #ffc107}
.toggle-bar{display:flex;border:1.5px solid #e0d0f0;border-radius:24px;overflow:hidden;width:fit-content;margin-bottom:22px}
.tb{padding:8px 24px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;cursor:pointer;background:transparent;border:none;color:#aaa;transition:all .2s}
.tb.on{background:#f0e8ff;color:#7a4db5;font-weight:700}
.sec{display:none}.sec.on{display:block}

/* ── 캘린더 ── */
.nav-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.nav-btn{background:none;border:1.5px solid #e0d0f0;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px;color:#9966cc;display:flex;align-items:center;justify-content:center;transition:all .2s;line-height:1}
.nav-btn:hover{background:#f0e8ff}
.nav-label{font-size:12px;color:#bbb}
.cal-head{display:flex;align-items:baseline;gap:12px;margin-bottom:20px}
.yv{font-size:12px;font-weight:700;color:#ccc;writing-mode:vertical-rl;transform:rotate(180deg);letter-spacing:3px}
.mn{font-size:44px;font-weight:700;color:#1a1a1a;letter-spacing:-2px}
.m2{font-size:44px;font-weight:700;color:#e8e8e8;margin-left:auto;letter-spacing:-2px}
.dlabels{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:2px}
.dl{text-align:center;font-size:11px;font-weight:500;color:#bbb;padding:4px 0}
.dl.sun{color:#e06060}.dl.sat{color:#6688cc}
.wrow{border-top:1px solid #f0f0f0;position:relative}
.dnums{display:grid;grid-template-columns:repeat(7,1fr)}
/* 날짜 숫자: 위 패딩만 주고 아래는 0 → 바와 붙도록 */
.dn{text-align:center;padding:6px 2px 0;font-size:12px;font-weight:500;color:#333}
.dn.sun{color:#e06060}.dn.sat{color:#6688cc}.dn.hol{color:#e06060}.dn.out{color:transparent}
.today-circle{width:24px;height:24px;border-radius:50%;background:#7a4db5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin:0 auto}
.barea{position:relative;overflow:hidden}
.bt{position:absolute;border-radius:5px;cursor:pointer}
/* 라벨 텍스트가 잘리지 않도록 overflow:visible */
.bl{position:absolute;font-size:8.5px;font-weight:700;white-space:nowrap;pointer-events:none;text-align:center;overflow:hidden;cursor:pointer}
.ep{position:absolute;border-radius:50%;border-width:2.5px;border-style:solid;background:#fff;z-index:3}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px;padding-top:12px;border-top:1px solid #f0f0f0}
.li{display:flex;align-items:center;gap:6px;font-size:10px;color:#999}
.ld{width:22px;height:6px;border-radius:3px}
.brand{text-align:right;font-size:10px;color:#ccc;margin-top:10px;font-style:italic}

/* ── 목록 ── */
.list-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.list-title{font-size:12px;color:#bbb}
.filter-btn{font-family:'Noto Sans KR',sans-serif;font-size:11px;padding:5px 12px;border-radius:20px;border:1.5px solid #e0d0f0;background:transparent;color:#aaa;cursor:pointer;transition:all .2s}
.filter-btn.on{background:#f0e8ff;border-color:#c9a7e8;color:#7a4db5;font-weight:700}
.list-scroll{max-height:600px;overflow-y:auto;display:flex;flex-direction:column;padding-right:2px}
.list-scroll::-webkit-scrollbar{width:3px}
.list-scroll::-webkit-scrollbar-thumb{background:#e0d0f0;border-radius:2px}
.date-group{padding:10px 0 6px;font-size:11px;font-weight:700;color:#bbb;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.date-group.today-group{color:#7a4db5}
.date-group::after{content:'';flex:1;height:1px;background:#f0f0f0}
.today-badge{font-size:9px;background:#7a4db5;color:#fff;padding:1px 6px;border-radius:8px;font-weight:700}
.past-divider{padding:8px 0 6px;font-size:10px;color:#ddd;display:flex;align-items:center;gap:8px;cursor:pointer}
.past-divider::before,.past-divider::after{content:'';flex:1;height:1px;background:#f0f0f0}
.card{border-radius:12px;border:1px solid #f0ecf8;background:#fff;padding:12px 14px;display:flex;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.04);margin-bottom:8px;cursor:pointer;transition:box-shadow .15s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.card.past{opacity:.7}
.cbar{width:4px;border-radius:4px;flex-shrink:0}
.cbody{flex:1;min-width:0}
/* 제목줄: 메인타이틀 + 과목명 한줄 */
.ctitle-row{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.cname{font-size:13px;font-weight:700;color:#1a1a1a;white-space:nowrap}
.csub{font-size:11px;color:#bbb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* 비고: 검정색 */
.cdetail{font-size:11px;color:#444;margin-bottom:5px;line-height:1.5}
/* 날짜+시간 pill */
.cinfo{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.cinfo-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.cpill{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 8px;border-radius:20px;background:#f5f0ff;color:#7a4db5;font-weight:500;white-space:nowrap}
.cpill.time{background:#fff5e6;color:#c07020}
.cpill.place{background:#e8f4ff;color:#2a72b5}
.card.past .cpill{opacity:.8}
/* 필터 */
.filter-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.filt-btn{font-family:'Noto Sans KR',sans-serif;font-size:10px;padding:5px 7px;border-radius:12px;border:1.5px solid #e0d0f0;background:#fff;color:#aaa;cursor:pointer;transition:all .15s;white-space:nowrap;position:relative}
.filt-btn.on{border-color:var(--fc);background:color-mix(in srgb,var(--fc) 12%,white)}
.filt-btn:not(.all-btn){min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center}
.filt-btn img{width:22px;height:22px;object-fit:contain;border-radius:3px}
.filt-btn .filt-emoji{font-size:20px;line-height:1}
/* 툴팁 */
.filt-btn::after{content:attr(data-tooltip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#333;color:#fff;font-size:10px;padding:3px 8px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:10}
.filt-btn:hover::after{opacity:1}
.empty-msg{text-align:center;padding:40px 0;font-size:13px;color:#ccc}
</style>
</head>
<body>
<div class="page">
  <div id="errMsg" class="err"></div>
  <div class="toggle-bar">
    <button class="tb on" onclick="sw('cal')">📅 캘린더</button>
    <button class="tb" onclick="sw('list')">📋 목록</button>
  </div>

  <!-- 캘린더 -->
  <div id="cal" class="sec on">
    <div class="nav-bar">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
      <span class="nav-label" id="navLabel"></span>
      <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="cal-head">
      <span class="yv" id="hYear"></span>
      <span class="mn" id="hMonthName"></span>
      <span class="m2" id="hMonthNum"></span>
    </div>
    <div class="dlabels">
      <div class="dl sun">일</div><div class="dl">월</div><div class="dl">화</div>
      <div class="dl">수</div><div class="dl">목</div><div class="dl">금</div><div class="dl sat">토</div>
    </div>
    <div id="weeks"></div>
    <div class="legend" id="legend"></div>
    <div class="brand">@Jeonju MBC K-HighTech Platform</div>
  </div>

  <!-- 목록 -->
  <div id="list" class="sec">
    <div class="list-toolbar">
      <span class="list-title" id="listTitle"></span>
      <button class="filter-btn" id="filterBtn" onclick="toggleFilter()">지난 일정 숨기기</button>
    </div>
    <div class="filter-wrap" id="filterWrap"></div>
    <div class="list-scroll" id="listScroll"></div>
  </div>
</div>

<script>
const WORKER_URL = 'https://jmbcedu.abyss9405.workers.dev';
const SECRET_KEY = 'hyunra2026';

const HOL = {
  '2026-1-1':'신정','2026-3-1':'삼일절','2026-5-1':'근로자의날',
  '2026-5-5':'어린이날','2026-5-24':'부처님오신날','2026-5-25':'대체휴일',
  '2026-6-6':'현충일','2026-8-15':'광복절','2026-9-24':'추석연휴',
  '2026-9-25':'추석','2026-9-26':'추석연휴','2026-10-3':'개천절',
  '2026-10-9':'한글날','2026-12-25':'크리스마스'
};
const MONTHS=['','January','February','March','April','May','June',
  'July','August','September','October','November','December'];

const today=new Date(); today.setHours(0,0,0,0);
const now=new Date();
let curYear=now.getFullYear(), curMonth=now.getMonth()+1;
let allCourses=[], hidePast=false, activeFilter=null, scrollTarget=null;

/* 레이아웃 상수
   SLOT_H: 슬롯 높이. BAR_H(9) + 라벨(10) + 여유(3) = 22 → 넉넉히 28
   barea height = rowMaxSlot * SLOT_H + LABEL_H (라벨 한 줄 여유)
*/
const BAR_H=9, GAP=1.2, EP=12, EP_H=EP/2, SLOT_H=22, LABEL_H=13, CW=100/7;

function getPos(day,sw){const o=sw+day-1;return{row:Math.floor(o/7),col:o%7};}

function getSegs(days,sw){
  const byRow={};
  days.forEach(d=>{const p=getPos(d,sw);(byRow[p.row]=byRow[p.row]||[]).push({col:p.col,day:d});});
  const out=[];
  Object.entries(byRow).forEach(([r,arr])=>{
    arr.sort((a,b)=>a.col-b.col);
    let s=arr[0],e=arr[0];
    for(let i=1;i<arr.length;i++){
      if(arr[i].col===e.col+1){e=arr[i];}
      else{out.push({row:+r,sc:s.col,ec:e.col,sd:s.day,ed:e.day});s=e=arr[i];}
    }
    out.push({row:+r,sc:s.col,ec:e.col,sd:s.day,ed:e.day});
  });
  return out;
}

/* ── 캘린더 렌더링 ── */
function renderCalendar(year,month,courses,prevSet=new Set(),nextSet=new Set()){
  const startWday=new Date(year,month-1,1).getDay();
  const daysInMonth=new Date(year,month,0).getDate();
  const numRows=Math.ceil((startWday+daysInMonth)/7);
  const isThisMonth=(year===today.getFullYear()&&month===today.getMonth()+1);
  const todayDay=today.getDate();

  const rowBars=Array.from({length:numRows},()=>[]);
  courses.forEach((c,ci)=>{
    const sorted=[...c.days].sort((a,b)=>a-b);
    const fd=sorted[0],ld=sorted[sorted.length-1];
    const ck=`${c.name}__${c.round||''}`;
    /* 이전 월에 같은 과정이 있으면 이 월의 첫날은 전체 개강이 아님 */
    const continuesFromPrev=prevSet.has(ck);
    /* 다음 월에 같은 과정이 있으면 이 월의 마지막날은 전체 종강이 아님 */
    const continuesToNext=nextSet.has(ck);
    getSegs(c.days,startWday).forEach(sg=>{
      rowBars[sg.row].push({...sg,c,ci,
        isOpen: sg.sd===fd && !continuesFromPrev,
        isClose:sg.ed===ld && !continuesToNext
      });
    });
  });

  const rowMaxSlot=rowBars.map(bars=>{
    const sorted=[...bars].sort((a,b)=>a.sc-b.sc||a.ci-b.ci);
    const claimed=[];
    sorted.forEach(b=>{
      let sl=0;
      while(claimed[sl]!==undefined&&claimed[sl]>=b.sc)sl++;
      b.slot=sl;claimed[sl]=b.ec;
    });
    return bars.length?Math.max(...bars.map(b=>b.slot+1)):0;
  });

  const wc=document.getElementById('weeks');
  wc.innerHTML='';

  for(let r=0;r<numRows;r++){
    const row=document.createElement('div');
    row.className='wrow';
    const dn=document.createElement('div');
    dn.className='dnums';
    for(let c=0;c<7;c++){
      const day=r*7+c-startWday+1;
      const cell=document.createElement('div');
      const holKey=`${year}-${month}-${day}`;
      let cls='dn'+(c===0?' sun':c===6?' sat':'');
      if(day>=1&&day<=daysInMonth){
        if(isThisMonth&&day===todayDay){
          cell.className=cls;
          const circ=document.createElement('div');
          circ.className='today-circle';
          circ.textContent=day;
          cell.appendChild(circ);
        } else {
          cell.textContent=day;
          if(HOL[holKey])cls+=' hol';
          cell.className=cls;
        }
      } else {
        cls+=' out';cell.textContent='-';cell.className=cls;
      }
      dn.appendChild(cell);
    }
    row.appendChild(dn);

    const bars=rowBars[r];
    {
      /* 바 없어도 항상 일정한 최소 여백 확보
         과정 1개 기준 높이, 2개 이상이면 그에 맞게 늘어남 */
      const maxSlot=Math.max(1, rowMaxSlot[r]);
      const areaH=maxSlot*SLOT_H + LABEL_H + 4;
      const ba=document.createElement('div');
      ba.className='barea';
      ba.style.height=areaH+'px';

      bars.forEach(b=>{
        const top=b.slot*SLOT_H;            // 슬롯 시작 y
        const barL=b.sc*CW+GAP;
        const barR=(b.ec+1)*CW-GAP;
        const barW=barR-barL;
        const barTop=top+(SLOT_H-BAR_H)/2;  // 슬롯 내 세로 중앙
        const epTop=barTop-(EP-BAR_H)/2;
        const lblTop=barTop+BAR_H+2;        // 라벨: 바 바로 아래

        /* 바 */
        const tr=document.createElement('div');
        tr.className='bt';
        tr.style.cssText=`left:${barL}%;width:${barW}%;top:${barTop}px;height:${BAR_H}px;background:${b.c.color};opacity:.82`;
        tr.title=b.c.round?`${b.c.name} ${b.c.round}`:b.c.name;
        tr.onclick=(()=>{
          const tName=b.c.name, tYear=curYear, tMonth=curMonth;
          return ()=>{ scrollTarget={name:tName,year:tYear,month:tMonth}; sw('list'); };
        })();
        ba.appendChild(tr);

        /* 라벨 */
        const lb=document.createElement('div');
        lb.className='bl';
        lb.style.cssText=`left:${barL}%;width:${barW}%;top:${lblTop}px;color:${b.c.color}`;
        lb.textContent=b.c.round?`${b.c.name} ${b.c.round}`:b.c.name;
        lb.onclick=(()=>{
          const tName=b.c.name, tYear=curYear, tMonth=curMonth;
          return ()=>{ scrollTarget={name:tName,year:tYear,month:tMonth}; sw('list'); };
        })();
        ba.appendChild(lb);

        /* 개강 원 */
        if(b.isOpen){
          const ds=document.createElement('div');
          ds.className='ep';
          ds.style.cssText=`width:${EP}px;height:${EP}px;left:calc(${barL}% - ${EP_H}px);top:${epTop}px;border-color:${b.c.color}`;
          ba.appendChild(ds);
        }
        /* 종강 원 */
        if(b.isClose){
          const de=document.createElement('div');
          de.className='ep';
          de.style.cssText=`width:${EP}px;height:${EP}px;left:calc(${barR}% - ${EP_H}px);top:${epTop}px;border-color:${b.c.color}`;
          ba.appendChild(de);
        }
      });
      row.appendChild(ba);
    } // end barea block
    wc.appendChild(row);
  }

  const leg=document.getElementById('legend');
  leg.innerHTML='';
  courses.forEach(c=>{
    const label=c.round?`${c.name} ${c.round}`:c.name;
    leg.innerHTML+=`<div class="li"><div class="ld" style="background:${c.color}"></div>${label}</div>`;
  });
  document.getElementById('hYear').textContent=year;
  document.getElementById('hMonthName').textContent=MONTHS[month];
  document.getElementById('hMonthNum').textContent=String(month).padStart(2,'0');
  document.getElementById('navLabel').textContent=`${year}년 ${month}월`;
}

/* ── 목록 렌더링 (과정별 카드 1개) ── */
function renderList(courses){
  const scroll=document.getElementById('listScroll');
  scroll.innerHTML='';

  if(!courses.length){
    scroll.innerHTML='<div class="empty-msg">등록된 일정이 없습니다.</div>';
    document.getElementById('listTitle').textContent=`${curYear}년 ${curMonth}월`;
    return;
  }

  /* 과정별로 날짜 범위 문자열 생성 + 대표 날짜(첫날) 기준 정렬 */
  const items=courses.map(c=>{
    const sorted=[...c.days].sort((a,b)=>a-b);
    const firstDay=sorted[0], lastDay=sorted[sorted.length-1];
    const firstDate=new Date(curYear,curMonth-1,firstDay);
    firstDate.setHours(0,0,0,0);
    const lastDate=new Date(curYear,curMonth-1,lastDay);
    lastDate.setHours(0,0,0,0);

    /* 연속 구간 → "5월 9일, 16일, 23–24일" 형태 */
    const ranges=[];
    let st=sorted[0],en=sorted[0];
    for(let i=1;i<sorted.length;i++){
      if(sorted[i]===en+1){en=sorted[i];}
      else{ranges.push(st===en?`${curMonth}월 ${st}일`:`${curMonth}월 ${st}–${en}일`);st=en=sorted[i];}
    }
    ranges.push(st===en?`${curMonth}월 ${st}일`:`${curMonth}월 ${st}–${en}일`);
    const dateStr=ranges.join(', ');

    /* 과정 전체가 과거인지 여부 */
    const isPast=lastDate<today;
    /* 오늘 포함 여부 */
    const hasToday=firstDate<=today&&today<=lastDate;

    return{c, firstDate, lastDate, dateStr, isPast, hasToday};
  });

  const future=items.filter(i=>!i.isPast).sort((a,b)=>a.firstDate-b.firstDate);
  const past  =items.filter(i=>i.isPast ).sort((a,b)=>b.firstDate-a.firstDate);

  function makeCard(item){
    const {c,dateStr,isPast,hasToday}=item;
    const card=document.createElement('div');
    card.className='card'+(isPast?' past':'');
    const label=c.round?`${c.name} ${c.round}`:c.name;
    const chips=[
      c.round ?`<span class="chip" style="background:${c.color}18;color:${c.color}">🔢 ${c.round}</span>`:'',
      (c.times&&c.times.length)?c.times.map(t=>`<span class="chip" style="background:${c.color}18;color:${c.color}">⏰ ${t}</span>`).join(''):'',
      c.place ?`<span class="chip" style="background:${c.color}18;color:${c.color}">📍 ${c.place}</span>`:'',
      c.detail?`<span class="chip" style="background:${c.color}18;color:${c.color}">📋 ${c.detail}</span>`:''
    ].join('');
    card.innerHTML=`
      <div class="cbar" style="background:${c.color};min-height:60px"></div>
      <div class="cbody">
        <div class="cname">${label}${hasToday?` <span class="today-badge" style="font-size:9px;background:#7a4db5;color:#fff;padding:1px 6px;border-radius:8px;font-weight:700;vertical-align:middle">진행중</span>`:''}</div>
        ${c.sub?`<div class="csub">${c.sub}</div>`:''}
        <div class="chips">${chips}</div>
        <div class="cdates">📅 ${dateStr}</div>
      </div>`;
    return card;
  }

  /* 미래(진행중 포함) */
  future.forEach(item=>scroll.appendChild(makeCard(item)));

  /* 과거 */
  if(filtPast.length){
    const div=document.createElement('div');
    div.className='past-divider';
    div.textContent=hidePast?`지난 일정 ${filtPast.length}건 보기`:'이전 일정';
    if(hidePast)div.onclick=toggleFilter;
    scroll.appendChild(div);
    if(!hidePast) filtPast.forEach(item=>scroll.appendChild(makeCard(item)));
  }

  document.getElementById('listTitle').textContent=`${curYear}년 ${curMonth}월`;
}

/* ── 필터 ── */
function toggleFilter(){
  hidePast=!hidePast;
  const btn=document.getElementById('filterBtn');
  btn.classList.toggle('on',hidePast);
  btn.textContent=hidePast?'지난 일정 보기':'지난 일정 숨기기';
  loadListData();
}

/* ── 뷰 전환 ── */
function sw(v){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  document.getElementById(v).classList.add('on');
  document.querySelectorAll('.tb')[v==='cal'?0:1].classList.add('on');
  if(v==='list') loadListData(); // renderListGroups 안에서 scrollTarget 처리됨
}

/* ── 목록용 멀티월 로드 ── */
let listLoaded = false; // 중복 로드 방지

async function fetchMonth(year, month){
  const cacheKey=`kdt-${year}-${month}`;
  const cached=sessionStorage.getItem(cacheKey);
  if(cached){
    try{ return JSON.parse(cached); }catch(e){ sessionStorage.removeItem(cacheKey); }
  }
  try{
    const controller=new AbortController();
    const timer=setTimeout(()=>controller.abort(),8000);
    const res=await fetch(
      `${WORKER_URL}/schedule?year=${year}&month=${month}`,
      {signal:controller.signal,headers:{'X-Secret-Key':SECRET_KEY}}
    );
    clearTimeout(timer);
    if(!res.ok) return null;
    const data=await res.json();
    sessionStorage.setItem(cacheKey,JSON.stringify(data));
    return data;
  }catch(e){ return null; }
}

async function loadListData(){
  const scroll=document.getElementById('listScroll');
  scroll.innerHTML='<div class="empty-msg">불러오는 중...</div>';
  document.getElementById('listTitle').textContent='일정 목록';

  // 범위: 오늘 기준 -6개월 ~ +12개월 (캘린더 월과 무관하게 고정)
  const baseYear=now.getFullYear(), baseMonth=now.getMonth()+1;
  const targets=[];
  for(let delta=-6; delta<=12; delta++){
    let y=baseYear, m=baseMonth+delta;
    while(m>12){m-=12;y++;}
    while(m<1) {m+=12;y--;}
    targets.push({y,m});
  }

  // 병렬 요청
  const results=await Promise.all(targets.map(t=>fetchMonth(t.y,t.m)));

  // 과정명+회차 기준으로 월 경계 없이 통합 그룹핑
  // seen은 과정별로 분리 → 같은 날짜라도 다른 과정이면 독립적으로 추가
  const groupMap={};

  results.forEach(data=>{
    if(!data||!data.courses) return;
    const {year,month,courses}=data;
    courses.forEach(c=>{
      const gk=`${c.name}__${c.round||''}`;
      if(!groupMap[gk]){
        groupMap[gk]={c,days:[],seenDates:new Set()};
      }
      c.days.forEach(day=>{
        const dateKey=`${year}-${month}-${day}`;
        if(groupMap[gk].seenDates.has(dateKey)) return; // 같은 과정 내 중복만 방지
        groupMap[gk].seenDates.add(dateKey);
        const dateObj=new Date(year,month-1,day);
        dateObj.setHours(0,0,0,0);
        groupMap[gk].days.push({day,year,month,dateObj});
      });
    });
  });

  // days 없는 그룹 제거 (안전장치)
  Object.keys(groupMap).forEach(k=>{ if(!groupMap[k].days.length) delete groupMap[k]; });

  // 각 그룹 날짜 정렬 + 표시 문자열 생성
  const groups=Object.values(groupMap).map(g=>{
    g.days.sort((a,b)=>a.dateObj-b.dateObj);
    g.firstDate=g.days[0].dateObj;
    g.lastDate=g.days[g.days.length-1].dateObj;

    // 월별로 묶어서 "2월 7·14일, 3월 7·14일" 형태로 표시
    const byMonth={};
    g.days.forEach(d=>{
      const mk=`${d.year}-${d.month}`;
      if(!byMonth[mk]) byMonth[mk]={year:d.year,month:d.month,days:[]};
      byMonth[mk].days.push(d.day);
    });
    const parts=Object.values(byMonth).map(bm=>{
      const sorted=[...bm.days].sort((a,b)=>a-b);
      const ranges=[];
      let st=sorted[0],en=sorted[0];
      for(let i=1;i<sorted.length;i++){
        if(sorted[i]===en+1){en=sorted[i];}
        else{ranges.push(st===en?`${st}일`:`${st}–${en}일`);st=en=sorted[i];}
      }
      ranges.push(st===en?`${st}일`:`${st}–${en}일`);
      return `${bm.month}월 ${ranges.join('·')}`;
    });
    g.dateStr=parts.join(', ');
    g.isPast=g.lastDate<today;
    g.hasToday=g.firstDate<=today&&today<=g.lastDate;
    return g;
  });

  // 미래+현재: 오름차순 / 과거: 내림차순
  const future=groups.filter(g=>!g.isPast).sort((a,b)=>a.firstDate-b.firstDate);
  const past  =groups.filter(g=>g.isPast ).sort((a,b)=>b.firstDate-a.firstDate);

  renderListGroups(future, past, scroll);
  document.getElementById('listTitle').textContent=`${curYear}년 ${curMonth}월 기준`;
}

function buildFilterButtons(groups){
  const wrap=document.getElementById('filterWrap');
  wrap.innerHTML='';
  // 과목명 중복제거
  const seen=new Set();
  const courses=[];
  groups.forEach(g=>{
    if(!seen.has(g.c.name)){seen.add(g.c.name);courses.push(g.c);}
  });
  // ★ 필터 고정 순서 — 과정명이 바뀌면 여기만 수정 ★
  const FILTER_ORDER=[
    '드론',
    '생성형 AI(기본 과정)',
    '생성형 AI(콘텐츠 제작)',
    '영상 편집(프리미어)',
    '영상 촬영',
    '가상스튜디오',
  ];
  courses.sort((a,b)=>{
    const ai=FILTER_ORDER.indexOf(a.name);
    const bi=FILTER_ORDER.indexOf(b.name);
    return (ai===-1?999:ai)-(bi===-1?999:bi);
  });
  if(courses.length<=1){wrap.style.display='none';return;}
  wrap.style.display='flex';
  // 전체 버튼
  const allBtn=document.createElement('button');
  allBtn.className='filt-btn all-btn'+(activeFilter===null?' on':'');
  allBtn.style.setProperty('--fc','#7a4db5');
  allBtn.style.fontSize='11px';
  allBtn.style.color=activeFilter===null?'#7a4db5':'#aaa';
  allBtn.textContent='전체';
  allBtn.onclick=()=>{activeFilter=null;loadListData();};
  wrap.appendChild(allBtn);
  courses.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='filt-btn'+(activeFilter===c.name?' on':'');
    btn.style.setProperty('--fc',c.color);
    btn.style.borderColor=activeFilter===c.name?c.color:'';
    btn.setAttribute('data-tooltip', c.name); // 툴팁: 마우스 올리면 과정명
    // 아이콘만 표시 (텍스트 없음)
    if(c.icon){
      if(c.icon.startsWith('http')||c.icon.startsWith('/')){
        btn.innerHTML=`<img src="${c.icon}" alt="${c.name}">`;
      } else {
        btn.innerHTML=`<span class="filt-emoji">${c.icon}</span>`;
      }
    } else {
      // 아이콘 없으면 과정명 전체 표시
      btn.textContent=c.name;
      btn.style.fontSize='10px';
      btn.style.color=activeFilter===c.name?c.color:'#aaa';
      btn.style.minWidth='auto';
      btn.style.minHeight='auto';
      btn.style.padding='5px 10px';
    }
    btn.onclick=()=>{activeFilter=c.name;loadListData();};
    wrap.appendChild(btn);
  });
}

function renderListGroups(future, past, scroll){
  scroll.innerHTML='';
  const allGroups=[...future,...past];

  // 필터 버튼 생성
  buildFilterButtons(allGroups);

  // activeFilter 적용
  const filtFuture=activeFilter?future.filter(g=>g.c.name===activeFilter):future;
  const filtPast  =activeFilter?past.filter(g=>g.c.name===activeFilter):past;

  if(!filtFuture.length&&!filtPast.length){
    scroll.innerHTML='<div class="empty-msg">해당 과목의 일정이 없습니다.</div>';
    return;
  }

  function makeCard(g){
    const {c,dateStr,isPast,hasToday}=g;
    const card=document.createElement('div');
    card.className='card'+(isPast?' past':'');
    const label=c.round?`${c.name} ${c.round}`:c.name;
    const repYear=g.days[0].year, repMonth=g.days[0].month;
    card.dataset.year=repYear;
    card.dataset.month=repMonth;
    card.dataset.courseName=c.name;
    // 클릭 → 캘린더 해당 월로 이동
    card.onclick=()=>{
      curYear=repYear; curMonth=repMonth;
      loadMonth(repYear,repMonth);
      sw('cal');
    };
    const timePills=(c.times&&c.times.length)?c.times.map(t=>`<span class="cpill time">⏰ ${t}</span>`).join(''):'';
    const placePill=c.place?`<span class="cpill place">📍 ${c.place}</span>`:'';
    card.innerHTML=`
      <div class="cbar" style="background:${c.color};min-height:56px"></div>
      <div class="cbody">
        <div class="ctitle-row">
          <span class="cname" style="color:${c.color}">${label}</span>
          ${c.sub?`<span class="csub">${c.sub}</span>`:''}
          ${hasToday?`<span style="font-size:9px;background:#7a4db5;color:#fff;padding:1px 6px;border-radius:8px;font-weight:700;flex-shrink:0">진행중</span>`:''}
        </div>
        ${c.detail?`<div class="cdetail">${c.detail}</div>`:''}
        <div class="cinfo">
          <div class="cinfo-row"><span class="cpill">📅 ${dateStr}</span></div>
          ${(timePills||placePill)?`<div class="cinfo-row">${timePills}${placePill}</div>`:''}
        </div>
      </div>`;
    return card;
  }

  /* 전체 내림차순: 미래(위) → 오늘 → 과거(아래)
     스크롤을 올리면 더 미래, 내리면 더 과거 */
  const descFuture=[...filtFuture].reverse(); // 가까운 미래가 아래, 먼 미래가 위
  let todayMarker=null;

  // 미래 역순으로 추가 (먼 미래 → 가까운 미래)
  descFuture.forEach(g=>scroll.appendChild(makeCard(g)));

  // 오늘 기준선
  todayMarker=document.createElement('div');
  todayMarker.id='todayMarker';
  todayMarker.style.cssText='padding:6px 0;font-size:10px;color:#7a4db5;font-weight:700;display:flex;align-items:center;gap:8px';
  todayMarker.innerHTML='<span style="flex:1;height:1px;background:#e0d0f0"></span>오늘 기준<span style="flex:1;height:1px;background:#e0d0f0"></span>';
  scroll.appendChild(todayMarker);

  // 과거
  if(filtPast.length){
    if(hidePast){
      const div=document.createElement('div');
      div.className='past-divider';
      div.textContent=`지난 일정 ${past.length}건 보기`;
      div.onclick=()=>{hidePast=false;document.getElementById('filterBtn').classList.remove('on');document.getElementById('filterBtn').textContent='지난 일정 숨기기';loadListData();};
      scroll.appendChild(div);
    } else {
      filtPast.forEach(g=>scroll.appendChild(makeCard(g)));
    }
  }

  // scrollTarget이 있으면 해당 카드로, 없으면 오늘 기준선으로
  setTimeout(()=>{
    if(scrollTarget){
      // 과정명 + 대표월 기준으로 카드 찾기
      const allCards=[...scroll.querySelectorAll('.card[data-month]')];
      // dataset.courseName은 data-course-name 속성으로 저장됨
      // 과정명만으로 매칭 (월/연도는 보조 조건)
      const target=allCards.find(card=>{
        const nameMatch=card.dataset.courseName===scrollTarget.name;
        const monthMatch=parseInt(card.dataset.month)===scrollTarget.month;
        const yearMatch=parseInt(card.dataset.year)===scrollTarget.year;
        return nameMatch && yearMatch && monthMatch;
      }) || allCards.find(card=>card.dataset.courseName===scrollTarget.name);
      if(target){
        target.scrollIntoView({block:'center',behavior:'smooth'});
        // 하이라이트 효과
        target.style.transition='box-shadow .3s';
        target.style.boxShadow=`0 0 0 2px ${target.querySelector('.cbar').style.background}`;
        setTimeout(()=>{ target.style.boxShadow=''; },1500);
      } else if(todayMarker){
        todayMarker.scrollIntoView({block:'center',behavior:'smooth'});
      }
      scrollTarget=null; // 초기화
    } else if(todayMarker){
      todayMarker.scrollIntoView({block:'center',behavior:'smooth'});
    }
  },400);

  // 스크롤 이벤트: scroll 컨테이너 상단에 걸친 카드의 월을 타이틀에 표시
  const titleEl=document.getElementById('listTitle');
  function updateTitle(){
    const cards=[...scroll.querySelectorAll('.card[data-month]')];
    if(!cards.length) return;
    const scrollRect=scroll.getBoundingClientRect();
    // scroll 컨테이너 상단(top) 기준으로 가장 가까운 카드 찾기
    let topCard=null;
    for(const card of cards){
      const cardRect=card.getBoundingClientRect();
      // 카드 하단이 컨테이너 상단보다 아래에 있으면 아직 보임
      if(cardRect.bottom >= scrollRect.top){
        topCard=card;
        break;
      }
    }
    if(!topCard) topCard=cards[cards.length-1];
    if(topCard){
      const y=topCard.dataset.year, m=topCard.dataset.month;
      if(y&&m) titleEl.textContent=`${y}년 ${m}월`;
    }
  }
  if(window._listScrollHandler) scroll.removeEventListener('scroll',window._listScrollHandler);
  window._listScrollHandler=updateTitle;
  scroll.addEventListener('scroll',updateTitle);
  setTimeout(updateTitle,200);
}

/* ── 데이터 로드 ── */
function adjMonth(year,month,delta){
  let m=month+delta, y=year;
  if(m>12){m-=12;y++;} if(m<1){m+=12;y--;}
  return{y,m};
}

async function loadMonth(year,month){
  const elErr=document.getElementById('errMsg');
  elErr.style.display='none';elErr.textContent='';
  renderCalendar(year,month,[],new Set(),new Set());

  if(WORKER_URL.includes('YOUR_WORKER')){
    elErr.textContent='⚠️ WORKER_URL을 실제 Cloudflare Worker 주소로 변경해주세요.';
    elErr.style.display='block';
    return;
  }

  try{
    const prev=adjMonth(year,month,-1), next=adjMonth(year,month,1);
    /* 현재 + 인접 월 병렬 요청 → 경계 dot 판단에 사용 */
    const [currData,prevData,nextData]=await Promise.all([
      fetchMonth(year,month),
      fetchMonth(prev.y,prev.m),
      fetchMonth(next.y,next.m)
    ]);
    if(!currData) throw new Error('데이터 없음');

    /* 인접 월에 존재하는 과정 키 셋 */
    const courseKey=c=>`${c.name}__${c.round||''}`;
    const prevSet=new Set((prevData?.courses||[]).map(courseKey));
    const nextSet=new Set((nextData?.courses||[]).map(courseKey));

    allCourses=currData.courses||[];
    renderCalendar(currData.year,currData.month,allCourses,prevSet,nextSet);
  }catch(e){
    console.error('Worker 오류:',e);
    elErr.textContent=`⚠️ 데이터를 불러오지 못했습니다. (${e.message})`;
    elErr.style.display='block';
  }
}

/* ── 월 이동 ── */
function changeMonth(delta){
  curMonth+=delta;
  if(curMonth>12){curMonth=1;curYear++;}
  if(curMonth<1){curMonth=12;curYear--;}
  // Ctrl+F5 (type=1) 또는 강제새로고침 시 캐시 제거
if(performance.navigation.type===1){
  sessionStorage.clear();
}
loadMonth(curYear,curMonth);
}

// Ctrl+F5 (type=1) 또는 강제새로고침 시 캐시 제거
if(performance.navigation.type===1){
  sessionStorage.clear();
}
loadMonth(curYear,curMonth);
